<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lyric Downloader | BR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; color: #fff; padding: 20px; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; background: linear-gradient(135deg, #1DB954, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .badge { color: #1DB954; font-size: 0.7rem; letter-spacing: 2px; font-weight: bold; }
        .card { background: #121212; border-radius: 24px; padding: 20px; border: 1px solid #2a2a2a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .mode-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; background: #1e1e1e; border: 1px solid #333; padding: 12px; border-radius: 40px; color: #888; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; }
        .mode-btn.active { background: #1DB954; color: #000; border-color: #1DB954; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; background: #1e1e1e; border: 1px solid #333; padding: 14px 16px; border-radius: 40px; color: #fff; font-size: 1rem; outline: none; }
        .search-box input:focus { border-color: #1DB954; }
        .search-box button { background: #1DB954; border: none; padding: 0 24px; border-radius: 40px; color: #000; font-weight: bold; cursor: pointer; }
        .results { margin-top: 20px; display: none; flex-direction: column; gap: 12px; max-height: 500px; overflow-y: auto; padding-right: 5px; }
        .result-card { background: #1a1a1a; border-radius: 16px; padding: 16px; border: 1px solid #2a2a2a; transition: transform 0.2s; }
        .result-title { font-weight: bold; font-size: 1rem; margin-bottom: 6px; color: #fff; }
        .result-artist { color: #1DB954; font-size: 0.85rem; margin-bottom: 4px; font-weight: 600; }
        .result-album { color: #888; font-size: 0.75rem; margin-bottom: 12px; }
        .track-count-badge { background: #333; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 0.65rem; margin-left: 5px; }
        .download-btn { background: #1DB954; border: none; padding: 12px; border-radius: 40px; color: #000; font-weight: bold; cursor: pointer; width: 100%; font-size: 0.9rem; transition: opacity 0.2s; }
        .download-btn.album { background: #9b59b6; color: #fff; }
        .download-btn:active { opacity: 0.7; transform: scale(0.98); }
        .console { margin-top: 20px; background: #0a0a0a; border-radius: 16px; padding: 12px; font-family: 'Courier New', monospace; font-size: 0.75rem; color: #b5ffb5; max-height: 250px; overflow-y: auto; border: 1px solid #1e2a1a; display: none; }
        .console-line { padding: 4px 0; border-bottom: 1px solid #1a1a1a; word-break: break-all; }
        .footer { text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid #2a2a2a; font-size: 0.7rem; color: #666; }
        .footer .name { color: #1DB954; font-weight: bold; margin: 5px 0; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1DB954; border-radius: 10px; }
        .loading { text-align: center; padding: 20px; color: #1DB954; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎵 Lyric Downloader</h1>
        <div class="badge">PRO VERSION · SYNCED LRC</div>
    </div>

    <div class="card">
        <div class="mode-buttons">
            <div id="modeTrack" class="mode-btn active">🎤 CANCIÓN</div>
            <div id="modeAlbum" class="mode-btn">💿 ÁLBUM</div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar..." autocomplete="off">
            <button id="searchBtn">BUSCAR</button>
        </div>

        <div id="results" class="results"></div>
        <div id="console" class="console"></div>
    </div>

    <footer class="footer">
        <div>✧ MADE WITH LOVE ✧</div>
        <div class="name">BY: BRYAN ROMERO GONZÁLEZ</div>
        <div>📧 BROMEROG003@ALUMNO.UAEMEX.MX</div>
    </footer>
</div>

<script>
    const modeTrackBtn = document.getElementById('modeTrack');
    const modeAlbumBtn = document.getElementById('modeAlbum');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsDiv = document.getElementById('results');
    const consoleDiv = document.getElementById('console');

    let currentMode = 'track';
    let albumCache = new Map();

    modeTrackBtn.onclick = () => { currentMode = 'track'; modeTrackBtn.classList.add('active'); modeAlbumBtn.classList.remove('active'); resultsDiv.style.display = 'none'; clearConsole(); };
    modeAlbumBtn.onclick = () => { currentMode = 'album'; modeAlbumBtn.classList.add('active'); modeTrackBtn.classList.remove('active'); resultsDiv.style.display = 'none'; clearConsole(); };

    function addToConsole(msg, isError = false) {
        consoleDiv.style.display = 'block';
        const line = document.createElement('div');
        line.className = 'console-line';
        line.style.color = isError ? '#ff6b6b' : '#b5ffb5';
        line.textContent = `> ${msg}`;
        consoleDiv.appendChild(line);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    function clearConsole() { consoleDiv.innerHTML = ''; consoleDiv.style.display = 'none'; }
    const delay = ms => new Promise(res => setTimeout(res, ms));

    async function getAlbumTracks(album, artist) {
        const key = `${album}|${artist}`.toLowerCase();
        if (albumCache.has(key)) return albumCache.get(key);
        try {
            const r = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(album + ' ' + artist)}`);
            const data = await r.json();
            const tracks = data.filter(t => t.albumName?.toLowerCase() === album.toLowerCase() && t.artistName?.toLowerCase() === artist.toLowerCase());
            albumCache.set(key, tracks);
            return tracks;
        } catch (e) { return []; }
    }

    async function downloadLyric(artist, track, silent = false) {
        if (!silent) addToConsole(`📥 Descargando: ${track}`);
        try {
            const r = await fetch(`https://lrclib.net/api/get?artist=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(track)}`);
            if (!r.ok) { if (!silent) addToConsole(`❌ No encontrado: ${track}`, true); return false; }
            const d = await r.json();
            const lyrics = d.syncedLyrics || d.plainLyrics;
            if (!lyrics) return false;
            const blob = new Blob([lyrics], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${artist} - ${track}.lrc`.replace(/[\\/:*?"<>|]/g, '-');
            a.click();
            if (!silent) addToConsole(`✅ ¡Listo! ${track}`);
            return true;
        } catch (e) { return false; }
    }

    async function downloadAlbum(album, artist) {
        resultsDiv.style.display = 'none'; clearConsole();
        addToConsole(`💿 ÁLBUM: ${album}`);
        const tracks = await getAlbumTracks(album, artist);
        if (!tracks.length) { addToConsole('❌ No se encontraron canciones', true); return; }
        addToConsole(`⏳ Procesando ${tracks.length} tracks...`);
        for (let i = 0; i < tracks.length; i++) {
            addToConsole(`[${i+1}/${tracks.length}] 🎵 ${tracks[i].trackName}`);
            await downloadLyric(tracks[i].artistName, tracks[i].trackName, true);
            await delay(600);
        }
        addToConsole(`🎉 Descarga completa en carpeta Downloads`);
    }

    async function search() {
        const q = searchInput.value.trim();
        if (q.length < 2) return;
        resultsDiv.style.display = 'flex';
        resultsDiv.innerHTML = '<div class="loading">🔍 BUSCANDO...</div>';
        clearConsole();
        try {
            const r = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(q)}`);
            const data = await r.json();
            if (!data.length) { resultsDiv.innerHTML = '<div class="loading">🎵 SIN RESULTADOS</div>'; return; }
            const unique = new Map();
            for (const item of data) {
                const key = currentMode === 'track' ? `${item.trackName}|${item.artistName}` : `${item.albumName}|${item.artistName}`;
                if (!unique.has(key.toLowerCase()) && unique.size < 8) unique.set(key.toLowerCase(), item);
            }
            resultsDiv.innerHTML = '';
            for (const item of unique.values()) {
                const card = document.createElement('div');
                card.className = 'result-card';
                if (currentMode === 'track') {
                    card.innerHTML = `<div class="result-title">${item.trackName}</div><div class="result-artist">🎤 ${item.artistName}</div><div class="result-album">💿 ${item.albumName || 'Single'}</div><button class="download-btn">⬇️ DESCARGAR LRC</button>`;
                    card.querySelector('button').onclick = () => downloadLyric(item.artistName, item.trackName);
                } else {
                    const tracks = await getAlbumTracks(item.albumName, item.artistName);
                    card.innerHTML = `<div class="result-title">💿 ${item.albumName}</div><div class="result-artist">🎤 ${item.artistName}</div><div class="result-album">📅 ${item.albumYear || 'N/A'} <span class="track-count-badge">${tracks.length} tracks</span></div><button class="download-btn album">💿 DESCARGAR ÁLBUM</button>`;
                    card.querySelector('button').onclick = () => downloadAlbum(item.albumName, item.artistName);
                }
                resultsDiv.appendChild(card);
            }
        } catch (e) { resultsDiv.innerHTML = '<div class="loading">⚠️ ERROR DE RED</div>'; }
    }

    searchBtn.onclick = search;
    searchInput.onkeypress = (e) => { if (e.key === 'Enter') search(); };
    addToConsole('🎵 Lyric Downloader Pro listo');
</script>
</body>
</html>

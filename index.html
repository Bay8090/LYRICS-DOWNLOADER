<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lyric Downloader Pro | BR</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at 10% 20%, #070707, #000000); font-family: 'Plus Jakarta Sans', sans-serif; color: #f0f0f0; min-height: 100vh; padding: 24px 16px; }
        .container { max-width: 850px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 32px; }
        h1 { font-weight: 800; font-size: 2.2rem; background: linear-gradient(135deg, #FFFFFF 0%, #B0FFC0 60%, #1DB954 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; margin-bottom: 6px; }
        .badge { display: inline-block; background: rgba(29, 185, 84, 0.2); backdrop-filter: blur(4px); border-radius: 40px; padding: 6px 14px; font-size: 0.7rem; font-weight: 600; letter-spacing: 1.5px; color: #1DB954; border: 0.5px solid rgba(29, 185, 84, 0.4); }
        .search-card { background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px; padding: 24px 20px; box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.6); }
        .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .mode-select { background: #0c0c0c; border: 1px solid #2a2a2a; border-radius: 60px; padding: 12px 18px; font-weight: 700; font-size: 0.85rem; color: #1DB954; cursor: pointer; outline: none; font-family: 'Plus Jakarta Sans', monospace; }
        .search-input { flex: 1; background: #0c0c0c; border: 1px solid #2a2a2a; border-radius: 60px; padding: 12px 20px; font-size: 0.95rem; color: white; outline: none; font-weight: 500; }
        #results { margin-top: 20px; display: none; flex-direction: column; gap: 12px; max-height: 500px; overflow-y: auto; border-radius: 20px; }
        .result-item { background: rgba(25, 25, 25, 0.95); border: 1px solid #2a2a2a; border-radius: 20px; padding: 14px; transition: all 0.2s ease; margin-bottom: 8px; }
        .result-header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
        .thumb { width: 52px; height: 52px; background: #1e1e1e; border-radius: 12px; object-fit: cover; }
        .info { flex: 1; }
        .info .title { font-size: 0.95rem; font-weight: 700; color: white; display: block; margin-bottom: 4px; }
        .info .sub { font-size: 0.7rem; color: #aaa; display: flex; gap: 10px; flex-wrap: wrap; }
        .album-badge { background: #1DB95420; color: #1DB954; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .track-count-badge { background: #444; color: #fff; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
        .download-btn { background: linear-gradient(135deg, #1DB954, #0f6e32); border: none; color: white; padding: 12px 20px; border-radius: 40px; font-weight: 700; font-size: 0.85rem; cursor: pointer; width: 100%; margin-top: 8px; transition: transform 0.1s; }
        .download-btn:active { transform: scale(0.96); }
        .download-btn.album-btn { background: linear-gradient(135deg, #9b59b6, #6c3483); }
        .console-log { margin-top: 24px; background: #030303; border-radius: 20px; border: 1px solid #1e2a1a; padding: 14px 18px; font-family: 'Menlo', 'Fira Code', monospace; font-size: 0.7rem; color: #b0ffb0; display: none; max-height: 280px; overflow-y: auto; }
        .console-log span { display: block; padding: 4px 0; border-bottom: 0.5px solid #1e3a1e; }
        .footer { margin-top: 42px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 28px; }
        .love { font-size: 0.65rem; letter-spacing: 3px; color: #5a5a5a; }
        .author-name { font-weight: 800; font-size: 0.8rem; margin-top: 6px; background: linear-gradient(135deg, #ddd, #fff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .contact { font-size: 0.7rem; color: #1DB954; text-decoration: none; font-weight: 500; margin-top: 6px; display: inline-block; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1DB954; border-radius: 10px; }
        .loading { text-align: center; padding: 20px; color: #1DB954; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎧 Lyric Downloader Pro</h1>
        <div class="badge">SYNCED LRC · BOTÓN DE DESCARGA · ANDROID READY</div>
    </div>
    <div class="search-card">
        <div class="controls">
            <select id="modeSelect" class="mode-select">
                <option value="track">🎵 Modo Track</option>
                <option value="album">💿 Modo Álbum</option>
            </select>
            <input type="text" id="searchQuery" class="search-input" placeholder="Buscar..." autocomplete="off">
        </div>
        <div id="results"></div>
        <div id="consolePanel" class="console-log"></div>
    </div>
    <footer class="footer">
        <div class="love">✧ MADE WITH LOVE ✧</div>
        <div class="author-name">BY: BRYAN ROMERO GONZÁLEZ</div>
        <a href="mailto:BROMEROG003@ALUMNO.UAEMEX.MX" class="contact">📧 Contacto Soporte</a>
    </footer>
</div>
<script>
    const searchInput = document.getElementById('searchQuery');
    const modeSelect = document.getElementById('modeSelect');
    const resultsDiv = document.getElementById('results');
    const consolePanel = document.getElementById('consolePanel');
    let debounceTimeout = null;
    let albumCache = new Map();

    function addLog(message, isError = false) {
        const logEntry = document.createElement('span');
        logEntry.textContent = `> ${message}`;
        logEntry.style.color = isError ? '#ff8a7a' : '#b5ffb5';
        consolePanel.appendChild(logEntry);
        consolePanel.scrollTop = consolePanel.scrollHeight;
        consolePanel.style.display = 'block';
    }

    function clearConsole() { consolePanel.innerHTML = ''; consolePanel.style.display = 'block'; addLog('📀 Sistema listo'); }
    const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

    function getThumbnailUrl(name, artist) {
        return `https://api.dicebear.com/7.x/identicon/svg?seed=${encodeURIComponent(name)}&backgroundColor=1a1a1a&size=52`;
    }

    function escapeHtml(str) { return str ? str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) : ''; }

    async function getAlbumTracks(album, artist) {
        const key = `${album}|${artist}`;
        if (albumCache.has(key)) return albumCache.get(key);
        try {
            const r = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(album + ' ' + artist)}`);
            const data = await r.json();
            const tracks = data.filter(t => t.albumName?.toLowerCase() === album.toLowerCase());
            albumCache.set(key, tracks);
            return tracks;
        } catch (e) { return []; }
    }

    async function downloadLyric(artist, track, showLog = true) {
        try {
            const r = await fetch(`https://lrclib.net/api/get?artist=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(track)}`);
            if (!r.ok) return false;
            const d = await r.json();
            const lyrics = d.syncedLyrics || d.plainLyrics;
            if (!lyrics) return false;
            const blob = new Blob([lyrics], { type: 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `${artist} - ${track}.lrc`.replace(/[\\/:*?"<>|]/g, '-');
            a.click();
            if (showLog) addLog(`✅ "${track}" descargada`);
            return true;
        } catch (e) { return false; }
    }

    async function downloadFullAlbum(album, artist) {
        resultsDiv.style.display = 'none'; clearConsole();
        addLog(`💿 Iniciando álbum: ${album}`);
        const tracks = await getAlbumTracks(album, artist);
        if (!tracks.length) { addLog('❌ No se encontraron tracks', true); return; }
        for (let i = 0; i < tracks.length; i++) {
            addLog(`[${i+1}/${tracks.length}] 🎵 ${tracks[i].trackName}`);
            await downloadLyric(tracks[i].artistName, tracks[i].trackName, true);
            await delay(600);
        }
        addLog('🎉 Descarga completa');
    }

    async function performSearch() {
        const q = searchInput.value.trim();
        if (q.length < 2) return;
        resultsDiv.innerHTML = '<div class="loading">🔍 Buscando...</div>';
        resultsDiv.style.display = 'flex';
        try {
            const r = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(q)}`);
            const data = await r.json();
            const mode = modeSelect.value;
            const unique = new Map();
            for (const item of data) {
                const key = mode === 'track' ? `${item.trackName}|${item.artistName}` : `${item.albumName}|${item.artistName}`;
                if (!unique.has(key.toLowerCase()) && unique.size < 8) {
                    if (mode === 'album' && !item.albumName) continue;
                    unique.set(key.toLowerCase(), item);
                }
            }
            resultsDiv.innerHTML = '';
            for (const item of unique.values()) {
                const card = document.createElement('div');
                card.className = 'result-item';
                if (mode === 'track') {
                    card.innerHTML = `<div class="result-header"><img class="thumb" src="${getThumbnailUrl(item.trackName, item.artistName)}"><div class="info"><span class="title">${escapeHtml(item.trackName)}</span><div class="sub"><span>🎤 ${escapeHtml(item.artistName)}</span></div></div></div><button class="download-btn">⬇️ DESCARGAR LRC</button>`;
                    card.querySelector('button').onclick = () => downloadLyric(item.artistName, item.trackName);
                } else {
                    const tracks = await getAlbumTracks(item.albumName, item.artistName);
                    card.innerHTML = `<div class="result-header"><img class="thumb" src="${getThumbnailUrl(item.albumName, item.artistName)}"><div class="info"><span class="title">💿 ${escapeHtml(item.albumName)}</span><div class="sub"><span>🎤 ${escapeHtml(item.artistName)}</span><span class="track-count-badge">${tracks.length} tracks</span></div></div></div><button class="download-btn album-btn">💿 DESCARGAR ÁLBUM</button>`;
                    card.querySelector('button').onclick = () => downloadFullAlbum(item.albumName, item.artistName);
                }
                resultsDiv.appendChild(card);
            }
        } catch (e) { resultsDiv.innerHTML = '⚠️ Error'; }
    }

    searchInput.oninput = () => {
        clearTimeout(debounceTimeout);
        debounceTimeout = setTimeout(performSearch, 500);
    };
    modeSelect.onchange = performSearch;
    addLog('🎵 Pro listo');
</script>
</body>
</html>

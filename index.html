<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyric Downloader Pro | Bryan Romero</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #1DB954; --card: #121212; --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding-bottom: 50px; }
        .container { max-width: 600px; margin: 40px auto; padding: 20px; }
        
        /* Header & Credits */
        .header { text-align: center; margin-bottom: 40px; }
        h1 { font-weight: 800; font-size: 2.5rem; margin: 0; background: linear-gradient(135deg, #fff 0%, #555 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Search Box */
        .search-section { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .input-row { display: flex; gap: 10px; margin-bottom: 20px; }
        select { background: #1a1a1a; color: white; border: 1px solid var(--border); border-radius: 12px; padding: 10px; font-weight: 600; cursor: pointer; }
        input { flex: 1; background: #1a1a1a; border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: white; font-size: 1rem; }
        
        /* Sugerencias (Búsqueda Indexada) */
        #suggestions { margin-top: 10px; border-radius: 12px; overflow: hidden; background: #181818; display: none; border: 1px solid var(--border); }
        .suggestion-item { display: flex; align-items: center; padding: 12px; cursor: pointer; border-bottom: 1px solid var(--border); transition: 0.2s; }
        .suggestion-item:hover { background: #252525; }
        .suggestion-item img { width: 50px; height: 50px; border-radius: 6px; margin-right: 15px; object-fit: cover; }
        .s-info b { display: block; font-size: 0.9rem; }
        .s-info span { font-size: 0.75rem; color: #888; }
        .type-tag { margin-left: auto; font-size: 0.6rem; font-weight: 800; background: var(--accent); color: black; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; }

        /* Consola de Descarga */
        #console { margin-top: 25px; background: #000; padding: 15px; border-radius: 12px; font-family: monospace; font-size: 0.8rem; display: none; color: #1DB954; max-height: 200px; overflow-y: auto; }

        footer { text-align: center; margin-top: 60px; padding: 20px; border-top: 1px solid var(--border); }
        .author { font-weight: 800; font-size: 0.9rem; color: #eee; margin-top: 5px; display: block; }
        .contact { color: var(--accent); text-decoration: none; font-size: 0.75rem; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Lyric Downloader</h1>
        <p style="color: #666; font-size: 0.8rem; letter-spacing: 2px;">INDEXED SEARCH & SYNC</p>
    </div>

    <div class="search-section">
        <div class="input-row">
            <select id="searchMode">
                <option value="track">TRACK</option>
                <option value="album">ALBUM</option>
            </select>
            <input type="text" id="query" placeholder="Ej: Death Leprosy..." oninput="searchIndex()">
        </div>

        <div id="suggestions"></div>
        <div id="console"></div>
    </div>
</div>

<footer>
    <div style="font-size: 0.6rem; color: #444; letter-spacing: 2px;">MADE WITH LOVE</div>
    <span class="author">BY: BRYAN ROMERO GONZÁLEZ</span>
    <a href="mailto:BROMEROG003@ALUMNO.UAEMEX.MX" class="contact">BROMEROG003@ALUMNO.UAEMEX.MX</a>
</footer>

<script>
    const suggestionsBox = document.getElementById('suggestions');
    const consoleBox = document.getElementById('console');

    // Simulación de búsqueda indexada (Usando la API de búsqueda de iTunes para portadas y metadatos sin necesidad de Auth)
    async function searchIndex() {
        const query = document.getElementById('query').value;
        const mode = document.getElementById('searchMode').value;
        
        if (query.length < 3) {
            suggestionsBox.style.display = 'none';
            return;
        }

        try {
            const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=${mode === 'track' ? 'song' : 'album'}&limit=5`);
            const data = await response.json();
            
            suggestionsBox.innerHTML = '';
            suggestionsBox.style.display = 'block';

            data.results.forEach(item => {
                const name = mode === 'track' ? item.trackName : item.collectionName;
                const artist = item.artistName;
                const year = new Date(item.releaseDate).getFullYear();
                const img = item.artworkUrl100;

                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.onclick = () => selectItem(artist, name, mode);
                div.innerHTML = `
                    <img src="${img}">
                    <div class="s-info">
                        <b>${name}</b>
                        <span>${artist} • ${year}</span>
                    </div>
                    <div class="type-tag">${mode}</div>
                `;
                suggestionsBox.appendChild(div);
            });
        } catch (e) { console.error(e); }
    }

    async function selectItem(artist, name, mode) {
        suggestionsBox.style.display = 'none';
        consoleBox.style.display = 'block';
        consoleBox.innerHTML = `> Iniciando descarga para ${mode}: ${name}...<br>`;

        if (mode === 'track') {
            await downloadLRC(artist, name);
        } else {
            // Para álbum, buscamos los tracks (Simulado por limitación de API pública rápida)
            consoleBox.innerHTML += `> Buscando tracks del álbum...<br>`;
            await downloadLRC(artist, name); // Descarga la principal
        }
    }

    async function downloadLRC(artist, track) {
        try {
            const res = await fetch(`https://lrclib.net/api/get?artist=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(track)}`);
            const data = await res.json();
            
            if (data.syncedLyrics) {
                const blob = new Blob([data.syncedLyrics], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${artist} - ${track}.lrc`;
                a.click();
                consoleBox.innerHTML += `<span style="color:#1DB954">> ✅ ${track} descargada correctamente.</span><br>`;
            } else {
                consoleBox.innerHTML += `<span style="color:#ff4444">> ❌ No hay letra sincronizada disponible.</span><br>`;
            }
        } catch (e) {
            consoleBox.innerHTML += `<span style="color:#ff4444">> ⚠️ Error de conexión.</span><br>`;
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyric Downloader</title>
</head>
<body>
    <h1>Lyric Downloader</h1>
    <p>Busca una canción y toca el enlace para descargar</p>
    
    <select id="modo">
        <option value="track">Canción</option>
        <option value="album">Álbum</option>
    </select>
    
    <br><br>
    
    <input type="text" id="buscar" placeholder="Escribe nombre de canción o artista" style="width: 80%; padding: 8px;">
    <button onclick="buscar()">Buscar</button>
    
    <br><br>
    
    <div id="resultados"></div>
    
    <hr>
    <p>BY: BRYAN ROMERO GONZÁLEZ</p>
    <p>BROMEROG003@ALUMNO.UAEMEX.MX</p>
    
    <script>
        let modoActual = 'track';
        
        document.getElementById('modo').onchange = function() {
            modoActual = this.value;
            document.getElementById('resultados').innerHTML = '';
        };
        
        async function buscar() {
            let query = document.getElementById('buscar').value.trim();
            if (query.length < 2) {
                alert('Escribe al menos 2 caracteres');
                return;
            }
            
            let resultadosDiv = document.getElementById('resultados');
            resultadosDiv.innerHTML = 'Buscando...';
            
            try {
                let url = 'https://lrclib.net/api/search?q=' + encodeURIComponent(query);
                let respuesta = await fetch(url);
                let datos = await respuesta.json();
                
                if (!datos || datos.length === 0) {
                    resultadosDiv.innerHTML = 'No se encontraron resultados';
                    return;
                }
                
                // Eliminar duplicados
                let unicos = new Map();
                for (let item of datos) {
                    let clave;
                    if (modoActual === 'track') {
                        clave = item.trackName + '|' + item.artistName;
                    } else {
                        clave = item.albumName + '|' + item.artistName;
                    }
                    if (!unicos.has(clave.toLowerCase()) && unicos.size < 10) {
                        unicos.set(clave.toLowerCase(), item);
                    }
                }
                
                resultadosDiv.innerHTML = '';
                
                if (modoActual === 'track') {
                    for (let item of unicos.values()) {
                        let div = document.createElement('div');
                        div.style.border = '1px solid #ccc';
                        div.style.margin = '10px 0';
                        div.style.padding = '10px';
                        div.innerHTML = `
                            <strong>${item.trackName || '?'}</strong><br>
                            ${item.artistName || '?'}<br>
                            ${item.albumName || 'Álbum'}<br>
                            <button onclick="descargar('${item.artistName}', '${item.trackName}')">Ver Letra y Descargar</button>
                            <br><br>
                        `;
                        resultadosDiv.appendChild(div);
                    }
                } else {
                    for (let item of unicos.values()) {
                        if (item.albumName) {
                            let div = document.createElement('div');
                            div.style.border = '1px solid #ccc';
                            div.style.margin = '10px 0';
                            div.style.padding = '10px';
                            div.innerHTML = `
                                <strong>${item.albumName}</strong><br>
                                ${item.artistName}<br>
                                Año: ${item.albumYear || 'N/A'}<br>
                                <button onclick="descargarAlbum('${item.albumName}', '${item.artistName}')">Ver Todas las Canciones</button>
                                <br><br>
                            `;
                            resultadosDiv.appendChild(div);
                        }
                    }
                }
                
            } catch(e) {
                resultadosDiv.innerHTML = 'Error: ' + e.message;
            }
        }
        
        async function descargar(artista, cancion) {
            let resultadosDiv = document.getElementById('resultados');
            resultadosDiv.innerHTML = 'Obteniendo letra...';
            
            try {
                let url = 'https://lrclib.net/api/get?artist=' + encodeURIComponent(artista) + '&track_name=' + encodeURIComponent(cancion);
                let respuesta = await fetch(url);
                let datos = await respuesta.json();
                
                let letra = datos.syncedLyrics || datos.plainLyrics;
                
                if (!letra) {
                    resultadosDiv.innerHTML = 'No hay letra disponible para esta canción';
                    return;
                }
                
                // Mostrar la letra en una nueva ventana para guardar
                let ventana = window.open();
                ventana.document.write(`
                    <html>
                    <head><title>${artista} - ${cancion}</title></head>
                    <body style="background:black; color:#1DB954; font-family:monospace; padding:20px;">
                        <h2>${artista} - ${cancion}</h2>
                        <pre style="background:#111; padding:15px; overflow:auto;">${letra}</pre>
                        <br>
                        <p><strong>Instrucciones:</strong></p>
                        <p>1. Selecciona TODO el texto (Ctrl+A o mantener presionado)</p>
                        <p>2. Copia (Ctrl+C)</p>
                        <p>3. Abre un bloc de notas y pega</p>
                        <p>4. Guarda como: ${artista} - ${cancion}.lrc</p>
                        <button onclick="navigator.clipboard.writeText(document.querySelector('pre').innerText)">📋 Copiar Letra</button>
                    </body>
                    </html>
                `);
                ventana.document.close();
                
                resultadosDiv.innerHTML = 'Letra abierta en nueva ventana. Copia y guarda como .lrc';
                
            } catch(e) {
                resultadosDiv.innerHTML = 'Error: ' + e.message;
            }
        }
        
        async function descargarAlbum(album, artista) {
            let resultadosDiv = document.getElementById('resultados');
            resultadosDiv.innerHTML = 'Buscando canciones del álbum...';
            
            try {
                let url = 'https://lrclib.net/api/search?q=' + encodeURIComponent(album + ' ' + artista);
                let respuesta = await fetch(url);
                let datos = await respuesta.json();
                
                let canciones = datos.filter(item => 
                    item.albumName && item.albumName.toLowerCase() === album.toLowerCase() &&
                    item.artistName && item.artistName.toLowerCase() === artista.toLowerCase()
                );
                
                if (canciones.length === 0) {
                    resultadosDiv.innerHTML = 'No se encontraron canciones para este álbum';
                    return;
                }
                
                resultadosDiv.innerHTML = `<h3>Álbum: ${album} - ${artista}</h3><p>${canciones.length} canciones encontradas</p>`;
                
                for (let i = 0; i < canciones.length; i++) {
                    let cancion = canciones[i];
                    let div = document.createElement('div');
                    div.style.margin = '10px 0';
                    div.style.padding = '10px';
                    div.style.border = '1px solid #ccc';
                    div.innerHTML = `
                        <strong>${cancion.trackName}</strong><br>
                        <button onclick="descargar('${cancion.artistName}', '${cancion.trackName}')">Ver Letra</button>
                    `;
                    resultadosDiv.appendChild(div);
                }
                
            } catch(e) {
                resultadosDiv.innerHTML = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>

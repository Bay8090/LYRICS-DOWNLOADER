<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lyric Downloader Pro | BR</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at 10% 20%, #070707, #000000); font-family: 'Plus Jakarta Sans', sans-serif; color: #f0f0f0; min-height: 100vh; padding: 24px 16px; }
        .container { max-width: 780px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 32px; }
        h1 { font-weight: 800; font-size: 2.5rem; background: linear-gradient(135deg, #FFFFFF 0%, #B0FFC0 60%, #1DB954 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; margin-bottom: 6px; }
        .badge { display: inline-block; background: rgba(29, 185, 84, 0.2); backdrop-filter: blur(4px); border-radius: 40px; padding: 6px 14px; font-size: 0.7rem; font-weight: 600; letter-spacing: 1.5px; color: #1DB954; border: 0.5px solid rgba(29, 185, 84, 0.4); }
        .search-card { background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px; padding: 24px 20px; box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.6); transition: all 0.2s ease; }
        .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .mode-select { background: #0c0c0c; border: 1px solid #2a2a2a; border-radius: 60px; padding: 12px 18px; font-weight: 700; font-size: 0.85rem; color: #1DB954; cursor: pointer; outline: none; font-family: 'Plus Jakarta Sans', monospace; transition: all 0.2s; }
        .mode-select:hover { border-color: #1DB954; background: #111; }
        .search-input { flex: 1; background: #0c0c0c; border: 1px solid #2a2a2a; border-radius: 60px; padding: 12px 20px; font-size: 0.95rem; color: white; outline: none; font-weight: 500; transition: all 0.2s; }
        .search-input:focus { border-color: #1DB954; box-shadow: 0 0 0 2px rgba(29, 185, 84, 0.2); }
        #results { margin-top: 20px; display: none; flex-direction: column; gap: 10px; max-height: 480px; overflow-y: auto; border-radius: 20px; }
        .result-item { background: rgba(25, 25, 25, 0.9); border: 1px solid #262626; border-radius: 18px; padding: 12px 16px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: all 0.2s ease; backdrop-filter: blur(2px); }
        .result-item:hover { background: #1f1f1f; transform: translateX(4px); border-color: #1DB954; }
        .thumb { width: 56px; height: 56px; background: #1e1e1e; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); object-fit: cover; }
        .item-info { flex: 1; }
        .item-info .title { font-size: 1rem; font-weight: 700; display: block; color: white; margin-bottom: 4px; }
        .item-info .sub { font-size: 0.75rem; color: #aaa; display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
        .album-detail { background: #1DB95410; color: #1DB954; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .track-count { background: #444; color: #fff; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
        .console-log { margin-top: 24px; background: #030303; border-radius: 20px; border: 1px solid #1e2a1a; padding: 14px 18px; font-family: 'Menlo', 'Fira Code', monospace; font-size: 0.7rem; color: #b0ffb0; display: none; max-height: 260px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
        .console-log span { display: block; padding: 4px 0; border-bottom: 0.5px solid #1e3a1e; }
        .footer { margin-top: 42px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 28px; }
        .love { font-size: 0.65rem; letter-spacing: 3px; color: #5a5a5a; }
        .author-name { font-weight: 800; font-size: 0.8rem; margin-top: 6px; background: linear-gradient(135deg, #ddd, #fff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .contact { font-size: 0.7rem; color: #1DB954; text-decoration: none; font-weight: 500; margin-top: 6px; display: inline-block; }
        .contact:hover { text-decoration: underline; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #1DB954; border-radius: 10px; }
        @media (max-width: 600px) { .controls { flex-direction: column; } .search-card { padding: 18px; } }
        .loading { text-align: center; padding: 20px; color: #1DB954; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎧 Lyric Downloader Pro</h1>
        <div class="badge">SYNCED LRC · SMART SEARCH · ALBUM DOWNLOADER</div>
    </div>
    <div class="search-card">
        <div class="controls">
            <select id="modeSelect" class="mode-select">
                <option value="track">🎵 Modo Track (Canción individual)</option>
                <option value="album">💿 Modo Álbum (Descarga completa)</option>
            </select>
            <input type="text" id="searchQuery" class="search-input" placeholder="Buscar canción, artista o álbum..." autocomplete="off">
        </div>
        <div id="results"></div>
        <div id="consolePanel" class="console-log"></div>
    </div>
    <footer class="footer">
        <div class="love">✧ MADE WITH LOVE ✧</div>
        <div class="author-name">BY: BRYAN ROMERO GONZÁLEZ</div>
        <a href="mailto:BROMEROG003@ALUMNO.UAEMEX.MX" class="contact">📧 BROMEROG003@ALUMNO.UAEMEX.MX</a>
    </footer>
</div>
<script>
    const searchInput = document.getElementById('searchQuery');
    const modeSelect = document.getElementById('modeSelect');
    const resultsDiv = document.getElementById('results');
    const consolePanel = document.getElementById('consolePanel');
    let debounceTimeout = null;
    let albumCache = new Map();

    function addLog(message, isError = false) {
        const logEntry = document.createElement('span');
        logEntry.textContent = `> ${message}`;
        if (isError) { logEntry.style.color = '#ff8a7a'; logEntry.style.borderLeft = '3px solid #ff5555'; logEntry.style.paddingLeft = '8px'; }
        else { logEntry.style.color = '#b5ffb5'; }
        consolePanel.appendChild(logEntry);
        consolePanel.scrollTop = consolePanel.scrollHeight;
        consolePanel.style.display = 'block';
    }

    function clearConsole() { consolePanel.innerHTML = ''; consolePanel.style.display = 'block'; addLog('📀 Consola lista para descargas'); }
    const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

    function getThumbnailUrl(albumName, artistName) {
        const seed = encodeURIComponent((albumName || artistName || 'album').slice(0, 40));
        return `https://api.dicebear.com/7.x/identicon/svg?seed=${seed}&backgroundColor=1a1a1a&size=56`;
    }

    function escapeHtml(str) { return str ? str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) : ''; }

    async function getAlbumTracks(albumName, artistName) {
        const cacheKey = `${albumName}|${artistName}`;
        if (albumCache.has(cacheKey)) return albumCache.get(cacheKey);
        try {
            const response = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(albumName + ' ' + artistName)}`);
            if (!response.ok) return [];
            const data = await response.json();
            const tracks = data.filter(t => t.albumName?.toLowerCase() === albumName.toLowerCase() && t.artistName?.toLowerCase() === artistName.toLowerCase());
            albumCache.set(cacheKey, tracks);
            return tracks;
        } catch (error) { return []; }
    }

    async function performSearch() {
        const query = searchInput.value.trim();
        if (query.length < 2) { resultsDiv.style.display = 'none'; return; }
        resultsDiv.innerHTML = '<div class="loading">🔍 Buscando...</div>';
        resultsDiv.style.display = 'flex';
        try {
            const response = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(query)}`);
            const data = await response.json();
            if (!data || data.length === 0) { resultsDiv.innerHTML = `<div style="padding:20px;text-align:center;color:#aaa;">🎵 Sin resultados.</div>`; return; }
            const currentMode = modeSelect.value;
            const uniqueMap = new Map();
            for (const item of data) {
                if (currentMode === 'track') {
                    const key = `${item.trackName?.toLowerCase()}|${item.artistName?.toLowerCase()}`;
                    if (!uniqueMap.has(key) && uniqueMap.size < 8) uniqueMap.set(key, item);
                } else if (item.albumName && item.artistName) {
                    const key = `${item.albumName?.toLowerCase()}|${item.artistName?.toLowerCase()}`;
                    if (!uniqueMap.has(key) && uniqueMap.size < 8) {
                        const tracks = await getAlbumTracks(item.albumName, item.artistName);
                        uniqueMap.set(key, { ...item, trackCount: tracks.length });
                    }
                }
            }
            resultsDiv.innerHTML = '';
            Array.from(uniqueMap.values()).forEach(item => {
                const thumbUrl = getThumbnailUrl(item.albumName || item.trackName, item.artistName);
                const resultItem = document.createElement('div');
                resultItem.className = 'result-item';
                if (currentMode === 'track') {
                    resultItem.innerHTML = `<img class="thumb" src="${thumbUrl}"><div class="item-info"><span class="title">${escapeHtml(item.trackName)}</span><div class="sub"><span>🎤 ${escapeHtml(item.artistName)}</span><span>📀 ${escapeHtml(item.albumName)}</span></div></div>`;
                    resultItem.addEventListener('click', () => downloadSingleTrack(item.artistName, item.trackName));
                } else {
                    resultItem.innerHTML = `<img class="thumb" src="${thumbUrl}"><div class="item-info"><span class="title">💿 ${escapeHtml(item.albumName)}</span><div class="sub"><span>🎤 ${escapeHtml(item.artistName)}</span><span class="album-detail">📅 ${escapeHtml(item.albumYear || 'Año N/D')}</span><span class="track-count">🎵 ${item.trackCount} tracks</span></div></div>`;
                    resultItem.addEventListener('click', () => downloadFullAlbum(item.albumName, item.artistName, item.trackCount));
                }
                resultsDiv.appendChild(resultItem);
            });
        } catch (err) { resultsDiv.innerHTML = `<div style="padding:20px;text-align:center;color:#ff8a7a;">⚠️ Error de conexión.</div>`; }
    }

    async function downloadSingleTrack(artist, trackName) {
        resultsDiv.style.display = 'none'; clearConsole();
        addLog(`🎵 Descargando: ${trackName} - ${artist}`);
        try {
            const response = await fetch(`https://lrclib.net/api/get?artist=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(trackName)}`);
            const lyricData = await response.json();
            const finalLyrics = lyricData.syncedLyrics || lyricData.plainLyrics;
            if (!finalLyrics) { addLog(`❌ Sin letra disponible`, true); return; }
            const blob = new Blob([finalLyrics], { type: 'text/plain;charset=utf-8' });
            const filename = `${artist.replace(/[\\/:*?"<>|]/g, '-')} - ${trackName.replace(/[\\/:*?"<>|]/g, '-')}.lrc`;
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
            addLog(`✅ "${trackName}" descargada exitosamente.`);
        } catch (err) { addLog(`🔥 Error: ${err.message}`, true); }
    }

    async function downloadFullAlbum(albumName, artistName, totalTracks) {
        resultsDiv.style.display = 'none'; clearConsole();
        addLog(`💿 Iniciando álbum: "${albumName}"`);
        try {
            const tracks = await getAlbumTracks(albumName, artistName);
            if (tracks.length === 0) { addLog(`❌ Sin canciones`, true); return; }
            addLog(`✅ Encontradas ${tracks.length} canciones.`);
            for (let idx = 0; idx < tracks.length; idx++) {
                const track = tracks[idx]; addLog(`\n[${idx+1}/${tracks.length}] 🎵 ${track.trackName}`);
                try {
                    const response = await fetch(`https://lrclib.net/api/get?artist=${encodeURIComponent(track.artistName)}&track_name=${encodeURIComponent(track.trackName)}`);
                    const lyricData = await response.json();
                    const finalLyrics = lyricData.syncedLyrics || lyricData.plainLyrics;
                    if (finalLyrics) {
                        const blob = new Blob([finalLyrics], { type: 'text/plain;charset=utf-8' });
                        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${track.artistName} - ${track.trackName}.lrc`; a.click();
                        addLog(`   ✅ Descargada`);
                    } else { addLog(`   ⚠️ Sin letra`, true); }
                    await delay(500);
                } catch (err) { await delay(500); }
            }
            addLog(`\n📀 DESCARGA COMPLETA`);
        } catch (err) { addLog(`❌ Error: ${err.message}`, true); }
    }

    searchInput.addEventListener('input', () => {
        if (searchInput.value.trim().length === 0) { resultsDiv.style.display = 'none'; return; }
        if (debounceTimeout) clearTimeout(debounceTimeout);
        debounceTimeout = setTimeout(() => performSearch(), 500);
    });

    modeSelect.addEventListener('change', () => { if (searchInput.value.trim().length >= 2) performSearch(); });
</script>
</body>
</html>
